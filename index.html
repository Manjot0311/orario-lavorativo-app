<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Timely">
  <meta name="theme-color" content="#f5f4f0">
  <title>Timely</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <style>
    /* ── Splash Screen ─────────────────────────────────────── */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #f5f4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #splash-screen.splash-hide {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }
    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: splashIn 0.5s ease both;
    }
    @keyframes splashIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .splash-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #1a1a1a;
    }
    .splash-tagline {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<!-- ── SPLASH SCREEN ──────────────────────────────────────── -->
<div id="splash-screen">
  <div class="splash-content">
    <img src="assets/web-app-manifest-192x192.png" alt="Timely" class="splash-logo">
    <div class="splash-name">Timely</div>
    <div class="splash-tagline">Track your work, simply.</div>
  </div>
</div>

<div id="app">

  <!-- ── UPDATE BANNER ─────────────────────────────────────── -->
  <div id="update-banner">
    <div class="ub-text">
      <strong>Nuova versione disponibile</strong> — ricarica per aggiornare l'app.
    </div>
    <div class="ub-actions">
      <button class="ub-reload" onclick="location.reload()">Aggiorna</button>
      <button class="ub-dismiss" onclick="document.getElementById('update-banner').classList.remove('visible')" title="Ignora">✕</button>
    </div>
  </div>

    <!-- ── HEADER ─────────────────────────────────────────── -->
    <header id="header">
      <div class="header-left">
        <span class="app-title">Timely</span>
        <span class="header-subtitle" id="header-subtitle"></span>
      </div>
      <div class="header-right">
        <button class="icon-btn" onclick="goToday()" title="Vai a oggi">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── VISTE ──────────────────────────────────────────── -->
    <main id="main">
      <section id="view-mese"     class="view active" data-view="mese"></section>
      <section id="view-anno"     class="view"        data-view="anno"></section>
      <section id="view-ferie"    class="view"        data-view="ferie"></section>
      <section id="view-settings" class="view"        data-view="settings"></section>
    </main>

    <!-- ── BOTTOM NAV ─────────────────────────────────────── -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-target="mese" onclick="showView('mese')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Mese</span>
      </button>
      <button class="nav-item" data-target="anno" onclick="showView('anno')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Anno</span>
      </button>
      <button class="nav-item" data-target="ferie" onclick="showView('ferie')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l4-8 4 4 4-6 4 10"/>
          <path d="M3 20h18"/>
        </svg>
        <span>Ferie</span>
      </button>
      <button class="nav-item" data-target="settings" onclick="showView('settings')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Config</span>
      </button>
    </nav>


  <!-- ── ONBOARDING ────────────────────────────────────────── -->
  <div id="onboarding-overlay">
    <div class="ob-sheet">
      <div class="ob-handle"></div>
      <div id="ob-progress" class="ob-progress"></div>
      <div id="ob-body"></div>
    </div>
  </div>

  <!-- ── BUSTA REMINDER ────────────────────────────────────── -->
  <div id="busta-reminder">
    <div class="br-text"></div>
    <div class="br-actions">
      <button class="br-update" onclick="openBustaUpdate()">Aggiorna</button>
      <button class="br-dismiss" onclick="dismissBustaReminder()">✕</button>
    </div>
  </div>

  </div><!-- /#app -->

  <!-- ── MODAL (bottom sheet) ────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div>
          <div class="modal-date" id="modal-date"></div>
          <div class="modal-title">Modifica giornata</div>
        </div>
        <button class="icon-btn" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Tipo giornata</label>
          <select id="m-tipo" class="field-select" onchange="onTipo()">
            <option value="">— non compilato —</option>
            <option value="Lavoro">Lavoro</option>
            <option value="Ferie">Ferie</option>
            <option value="Festivo">Festivo</option>
            <option value="Malattia">Malattia</option>
            <option value="Permesso">Permesso (giornata intera)</option>
          </select>
        </div>
        <div id="modal-work-fields">
          <div class="time-grid">
            <div class="field-group">
              <label class="field-label">Entrata</label>
              <input type="time" id="m-e" class="field-input">
            </div>
            <div class="field-group">
              <label class="field-label">Usc. Pranzo</label>
              <input type="time" id="m-up" class="field-input">
            </div>
            <div class="field-group">
              <label class="field-label">Rient. Pranzo</label>
              <input type="time" id="m-rp" class="field-input">
            </div>
            <div class="field-group">
              <label class="field-label">Uscita</label>
              <input type="time" id="m-u" class="field-input">
            </div>
          </div>
          <div class="absence-section" id="modal-absence-section">
            <div class="absence-title">Assenze parziali</div>
            <div class="perm-two-fields">
              <div class="field-group">
                <label class="field-label">Ore</label>
                <input type="number" id="m-perm-h" class="field-input" min="0" max="8" placeholder="0" inputmode="numeric">
              </div>
              <div class="perm-two-sep">:</div>
              <div class="field-group">
                <label class="field-label">Minuti</label>
                <input type="number" id="m-perm-m" class="field-input" min="0" max="59" placeholder="0" inputmode="numeric">
              </div>
            </div>
            <input type="hidden" id="m-perm" value="">
            <input type="hidden" id="m-fer" value="0">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Note</label>
          <input type="text" id="m-note" class="field-input" placeholder="Visita medica, corso…">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" onclick="delDay()">Elimina</button>
        <div class="modal-actions-right">
          <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
          <button class="btn btn-primary" onclick="saveDay()">Salva</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TOAST ───────────────────────────────────────────── -->
  <div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="js/utils/time.js"></script>
<script src="js/utils/date.js"></script>
<script src="js/components/icons.js"></script>
<script src="js/components/fpcard.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/constants.js"></script>
<script src="js/core/engine.js"></script>
<script src="js/views/onboarding.js"></script>
<script src="js/views/mese.js"></script>
<script src="js/views/anno.js"></script>
<script src="js/views/ferie.js"></script>
<script src="js/views/settings.js"></script>
<script src="js/app.js"></script>

</body>
</html>
